<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理后台登录</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1989fa 0%, #0e6fd6 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .login-container {
      background: white;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
    }
    
    .login-header {
      text-align: center;
      margin-bottom: 32px;
    }
    
    .login-logo {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, #1989fa 0%, #0e6fd6 100%);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      font-size: 32px;
      color: white;
    }
    
    .login-title {
      font-size: 24px;
      font-weight: bold;
      color: #333;
      margin-bottom: 8px;
    }
    
    .login-subtitle {
      font-size: 14px;
      color: #999;
    }
    
    .form-group {
      margin-bottom: 24px;
    }
    
    .form-label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: #333;
      margin-bottom: 8px;
    }
    
    .form-input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e8e8e8;
      border-radius: 8px;
      font-size: 14px;
      transition: all 0.3s;
    }
    
    .form-input:focus {
      outline: none;
      border-color: #1989fa;
      box-shadow: 0 0 0 3px rgba(25, 137, 250, 0.1);
    }
    
    .form-input.error {
      border-color: #ee0a24;
    }
    
    .captcha-row {
      display: flex;
      gap: 12px;
    }
    
    .captcha-input {
      flex: 1;
    }
    
    .captcha-image {
      width: 120px;
      height: 44px;
      border: 2px solid #e8e8e8;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .captcha-image:hover {
      border-color: #1989fa;
      opacity: 0.8;
    }
    
    .login-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #1989fa 0%, #0e6fd6 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(25, 137, 250, 0.4);
    }
    
    .login-btn:active {
      transform: translateY(0);
    }
    
    .login-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    
    .error-message {
      color: #ee0a24;
      font-size: 12px;
      margin-top: 6px;
      display: none;
    }
    
    .error-message.active {
      display: block;
    }
    
    .toast {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.75);
      color: white;
      padding: 16px 24px;
      border-radius: 8px;
      font-size: 14px;
      z-index: 10000;
      display: none;
    }
    
    .toast.active {
      display: block;
      animation: fadeInOut 2s ease-in-out;
    }
    
    @keyframes fadeInOut {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
      20% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
      80% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <div class="login-logo">📊</div>
      <h1 class="login-title">分销系统管理后台</h1>
      <p class="login-subtitle">请输入账号密码登录</p>
    </div>
    
    <form id="loginForm">
      <div class="form-group">
        <label class="form-label">用户名</label>
        <input 
          type="text" 
          id="username" 
          class="form-input" 
          placeholder="请输入用户名"
          autocomplete="username"
        />
        <div class="error-message" id="usernameError">用户名不能为空</div>
      </div>
      
      <div class="form-group">
        <label class="form-label">密码</label>
        <input 
          type="password" 
          id="password" 
          class="form-input" 
          placeholder="请输入密码"
          autocomplete="current-password"
        />
        <div class="error-message" id="passwordError">密码不能为空</div>
      </div>
      
      <div class="form-group">
        <label class="form-label">验证码</label>
        <div class="captcha-row">
          <input 
            type="text" 
            id="captcha" 
            class="form-input captcha-input" 
            placeholder="请输入验证码"
            maxlength="4"
          />
          <canvas 
            id="captchaCanvas" 
            class="captcha-image"
            width="120"
            height="44"
            title="点击刷新验证码"
          ></canvas>
        </div>
        <div class="error-message" id="captchaError">验证码不能为空</div>
      </div>
      
      <button type="submit" class="login-btn" id="loginBtn">
        登 录
      </button>
    </form>
  </div>
  
  <div class="toast" id="toast"></div>
  
  <script>
    // API 基础地址
    const API_BASE = 'https://distribution-system-production.up.railway.app/api';
    
    // 当前验证码
    let currentCaptcha = '';
    
    // 生成随机验证码
    function generateCaptcha() {
      const chars = '23456789ABCDEFGHJKLMNPQRSTUVWXYZ'; // 去掉容易混淆的字符
      let result = '';
      for (let i = 0; i < 4; i++) {
        result += chars.charAt(Math.floor(Math.random() * chars.length));
      }
      return result;
    }
    
    // 绘制验证码
    function drawCaptcha() {
      const canvas = document.getElementById('captchaCanvas');
      const ctx = canvas.getContext('2d');
      
      // 清空画布
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      // 随机背景色
      const bgColor = `rgb(${Math.random()*50+200}, ${Math.random()*50+200}, ${Math.random()*50+200})`;
      ctx.fillStyle = bgColor;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      // 生成验证码
      currentCaptcha = generateCaptcha();
      
      // 绘制验证码
      ctx.font = 'bold 24px Arial';
      ctx.textBaseline = 'middle';
      
      for (let i = 0; i < currentCaptcha.length; i++) {
        ctx.save();
        const x = 20 + i * 25;
        const y = 22;
        const angle = (Math.random() - 0.5) * 0.3;
        const color = `rgb(${Math.random()*150}, ${Math.random()*150}, ${Math.random()*150})`;
        
        ctx.translate(x, y);
        ctx.rotate(angle);
        ctx.fillStyle = color;
        ctx.fillText(currentCaptcha[i], 0, 0);
        ctx.restore();
      }
      
      // 添加干扰线
      for (let i = 0; i < 3; i++) {
        ctx.strokeStyle = `rgba(${Math.random()*255}, ${Math.random()*255}, ${Math.random()*255}, 0.5)`;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(Math.random() * canvas.width, Math.random() * canvas.height);
        ctx.lineTo(Math.random() * canvas.width, Math.random() * canvas.height);
        ctx.stroke();
      }
      
      // 添加干扰点
      for (let i = 0; i < 30; i++) {
        ctx.fillStyle = `rgba(${Math.random()*255}, ${Math.random()*255}, ${Math.random()*255}, 0.5)`;
        ctx.beginPath();
        ctx.arc(Math.random() * canvas.width, Math.random() * canvas.height, 2, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    
    // 显示提示
    function showToast(message, duration = 2000) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('active');
      setTimeout(() => {
        toast.classList.remove('active');
      }, duration);
    }
    
    // 验证表单
    function validateForm() {
      let valid = true;
      
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const captcha = document.getElementById('captcha').value.trim();
      
      // 验证用户名
      if (!username) {
        document.getElementById('usernameError').classList.add('active');
        document.getElementById('username').classList.add('error');
        valid = false;
      } else {
        document.getElementById('usernameError').classList.remove('active');
        document.getElementById('username').classList.remove('error');
      }
      
      // 验证密码
      if (!password) {
        document.getElementById('passwordError').classList.add('active');
        document.getElementById('password').classList.add('error');
        valid = false;
      } else {
        document.getElementById('passwordError').classList.remove('active');
        document.getElementById('password').classList.remove('error');
      }
      
      // 验证验证码
      if (!captcha) {
        document.getElementById('captchaError').classList.add('active');
        document.getElementById('captcha').classList.add('error');
        valid = false;
      } else {
        document.getElementById('captchaError').classList.remove('active');
        document.getElementById('captcha').classList.remove('error');
      }
      
      return valid;
    }
    
    // 登录处理
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      if (!validateForm()) {
        return;
      }
      
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const captcha = document.getElementById('captcha').value.trim().toUpperCase();
      
      // 验证验证码
      if (captcha !== currentCaptcha) {
        showToast('验证码错误，请重新输入');
        drawCaptcha();
        document.getElementById('captcha').value = '';
        return;
      }
      
      const loginBtn = document.getElementById('loginBtn');
      loginBtn.disabled = true;
      loginBtn.textContent = '登录中...';
      
      try {
        const response = await fetch(`${API_BASE}/auth/login`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ username, password })
        });
        
        const data = await response.json();
        
        if (data.code === 200) {
          // 检查是否是管理员
          if (!data.data.user.isAdmin) {
            showToast('普通用户无法访问管理后台');
            loginBtn.disabled = false;
            loginBtn.textContent = '登 录';
            return;
          }
          
          // 保存登录信息
          localStorage.setItem('admin_token', data.data.token);
          localStorage.setItem('admin_user', JSON.stringify({
            id: data.data.user.id,
            username: data.data.user.username,
            nickname: data.data.user.nickname,
            isAdmin: data.data.user.isAdmin
          }));
          
          // 登录成功，直接跳转，不显示 toast（避免闪现）
          // 使用 replace 替换当前页面，不保留历史记录
          window.location.replace('index.html');
        } else {
          showToast(data.message || '登录失败');
          loginBtn.disabled = false;
          loginBtn.textContent = '登 录';
          drawCaptcha();
          document.getElementById('captcha').value = '';
        }
      } catch (error) {
        console.error('登录失败:', error);
        showToast('网络错误，请稍后重试');
        loginBtn.disabled = false;
        loginBtn.textContent = '登 录';
        drawCaptcha();
        document.getElementById('captcha').value = '';
      }
    });
    
    // 点击验证码刷新
    document.getElementById('captchaCanvas').addEventListener('click', drawCaptcha);
    
    // 输入框获得焦点时清除错误
    document.querySelectorAll('.form-input').forEach(input => {
      input.addEventListener('focus', function() {
        this.classList.remove('error');
        const errorEl = document.getElementById(this.id + 'Error');
        if (errorEl) {
          errorEl.classList.remove('active');
        }
      });
    });
    
    // 页面加载时绘制验证码
    drawCaptcha();
    
    // 检查是否已登录
    window.addEventListener('load', () => {
      const token = localStorage.getItem('admin_token');
      const userStr = localStorage.getItem('admin_user');
      
      if (token && userStr) {
        try {
          const user = JSON.parse(userStr);
          if (user && user.isAdmin) {
            // 已登录，直接跳转到管理后台
            window.location.href = 'index.html';
            return;
          }
        } catch (e) {
          console.error('解析用户信息失败:', e);
        }
      }
      
      // 未登录，清除所有登录信息
      localStorage.removeItem('admin_token');
      localStorage.removeItem('admin_user');
    });
  </script>
</body>
</html>
