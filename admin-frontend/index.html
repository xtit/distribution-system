<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>分销系统管理后台</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f0f2f5; }
    .header { background: linear-gradient(135deg, #1989fa 0%, #0e6fd6 100%); color: white; padding: 20px 30px; }
    .header h1 { font-size: 24px; margin-bottom: 5px; }
    .nav-tabs { display: flex; background: white; padding: 0 30px; border-bottom: 1px solid #e8e8e8; }
    .nav-tab { padding: 16px 24px; cursor: pointer; border-bottom: 3px solid transparent; font-weight: 500; color: #666; }
    .nav-tab.active { color: #1989fa; border-bottom-color: #1989fa; }
    .container { max-width: 1400px; margin: 0 auto; padding: 30px; }
    .section { background: white; border-radius: 12px; padding: 24px; display: none; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    .section.active { display: block; }
    .section-title { font-size: 18px; font-weight: bold; margin-bottom: 16px; color: #333; }
    
    /* 按钮样式 */
    .btn { 
      padding: 6px 12px; 
      border: none; 
      border-radius: 4px; 
      cursor: pointer; 
      font-size: 12px; 
      margin: 2px;
      transition: all 0.2s;
      pointer-events: auto !important;
      position: relative;
      z-index: 100 !important;
      display: inline-block;
    }
    .btn:hover { opacity: 0.85; }
    .btn:active { transform: scale(0.98); }
    .btn-primary { background: #1989fa; color: white; }
    .btn-success { background: #07c160; color: white; }
    .btn-warning { background: #ff976a; color: white; }
    .btn-danger { background: #ee0a24; color: white; }
    .btn-sm { padding: 5px 10px; font-size: 12px; }
    
    /* 表格样式 */
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid #f0f0f0; }
    th { background: #f7f8fa; color: #666; font-weight: 600; }
    td { font-size: 14px; }
    tr:hover { background: #f7f8fa; }
    td button { pointer-events: auto !important; z-index: 100 !important; }
    
    /* 徽章样式 */
    .badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; display: inline-block; }
    .badge-success { background: #e8f5e9; color: #07c160; }
    .badge-danger { background: #ffebeb; color: #ee0a24; }
    
    /* 操作按钮组 */
    .action-buttons { display: flex; gap: 4px; align-items: center; }
    .action-buttons button { pointer-events: auto !important; z-index: 100 !important; }
    
    /* 自定义弹窗 */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: white;
      border-radius: 12px;
      padding: 24px;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }
    .modal-title { font-size: 18px; font-weight: bold; margin-bottom: 16px; color: #333; }
    .modal-content { font-size: 14px; color: #666; margin-bottom: 24px; line-height: 1.6; }
    .modal-buttons { display: flex; gap: 12px; justify-content: flex-end; }
    .modal-buttons button { flex: 1; max-width: 120px; }
    
    /* Toast 提示 */
    .toast {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.75);
      color: white;
      padding: 16px 24px;
      border-radius: 8px;
      font-size: 14px;
      z-index: 10000;
      display: none;
    }
    .toast.active { display: block; }
    .toast.success { background: rgba(7, 193, 96, 0.9); }
    .toast.error { background: rgba(238, 10, 36, 0.9); }
    .toast.loading { background: rgba(25, 137, 250, 0.9); }
  </style>
</head>
<body>
  <div class="header">
    <h1>📊 分销系统管理后台</h1>
    <p>实时数据统计与管理系统</p>
  </div>
  
  <div class="nav-tabs">
    <div class="nav-tab active" onclick="switchTab('dashboard')">📊 数据统计</div>
    <div class="nav-tab" onclick="switchTab('users')">👥 用户管理</div>
    <div class="nav-tab" onclick="switchTab('referral')">🌳 分销关系</div>
    <div class="nav-tab" onclick="switchTab('commissions')">💰 佣金管理</div>
    <div class="nav-tab" onclick="switchTab('orders')">📦 订单管理</div>
    <div class="nav-tab" onclick="switchTab('products')">📦 商品管理</div>
    <div class="nav-tab" onclick="switchTab('settings')">⚙️ 系统配置</div>
  </div>
  
  <div class="container">
    <!-- 数据统计 -->
    <div id="dashboard" class="section active">
      <div class="section-title">📊 数据统计</div>
      <div id="dashboardContent">
        <div style="text-align: center; padding: 40px; color: #999;">加载中...</div>
      </div>
    </div>
    
    <!-- 用户管理 -->
    <div id="users" class="section">
      <div class="section-title">👥 用户管理</div>
      <div id="userList">
        <div style="text-align: center; padding: 40px; color: #999;">加载中...</div>
      </div>
    </div>
    
    <!-- 分销关系 -->
    <div id="referral" class="section">
      <div class="section-title">🌳 分销关系</div>
      <div id="referralContent">
        <div style="text-align: center; padding: 40px; color: #999;">加载中...</div>
      </div>
    </div>
    
    <!-- 佣金管理 -->
    <div id="commissions" class="section">
      <div class="section-title">💰 佣金管理</div>
      <div id="commissionList">
        <div style="text-align: center; padding: 40px; color: #999;">加载中...</div>
      </div>
    </div>
    
    <!-- 订单管理 -->
    <div id="orders" class="section">
      <div class="section-title">📦 订单管理</div>
      <div id="orderList">
        <div style="text-align: center; padding: 40px; color: #999;">加载中...</div>
      </div>
    </div>
    
    <!-- 商品管理 -->
    <div id="products" class="section active">
      <div class="section-title">📦 商品管理</div>
      <div style="margin-bottom: 16px; display: flex; gap: 10px; align-items: center;">
        <button class="btn btn-primary" onclick="showAddProduct()">+ 添加商品</button>
        <button class="btn btn-warning" onclick="showRecycleBin()">🗑️ 回收站</button>
      </div>
      <div id="productList">
        <div style="text-align: center; padding: 40px; color: #999;">加载中...</div>
      </div>
    </div>
    
    <!-- 系统配置 -->
    <div id="settings" class="section">
      <div class="section-title">⚙️ 系统配置</div>
      
      <!-- 修改密码 -->
      <div style="background: #f7f8fa; padding: 20px; border-radius: 8px; margin-bottom: 20px;">
        <div style="font-size: 16px; font-weight: bold; margin-bottom: 16px; color: #333;">
          🔐 修改密码
        </div>
        <div style="max-width: 400px;">
          <div style="margin-bottom: 16px;">
            <label style="display: block; margin-bottom: 8px; font-size: 14px; color: #666;">原密码</label>
            <input 
              type="password" 
              id="oldPassword" 
              placeholder="请输入原密码"
              style="width: 100%; padding: 10px; border: 1px solid #e8e8e8; border-radius: 6px; font-size: 14px;"
            />
          </div>
          <div style="margin-bottom: 16px;">
            <label style="display: block; margin-bottom: 8px; font-size: 14px; color: #666;">新密码</label>
            <input 
              type="password" 
              id="newPassword" 
              placeholder="请输入新密码（至少 6 位）"
              style="width: 100%; padding: 10px; border: 1px solid #e8e8e8; border-radius: 6px; font-size: 14px;"
            />
          </div>
          <div style="margin-bottom: 16px;">
            <label style="display: block; margin-bottom: 8px; font-size: 14px; color: #666;">确认新密码</label>
            <input 
              type="password" 
              id="confirmPassword" 
              placeholder="请再次输入新密码"
              style="width: 100%; padding: 10px; border: 1px solid #e8e8e8; border-radius: 6px; font-size: 14px;"
            />
          </div>
          <button 
            onclick="changePassword()"
            class="btn btn-primary"
            style="width: 100%; padding: 12px; font-size: 15px;"
          >
            确认修改
          </button>
        </div>
      </div>
      
      <div id="settingsContent">
        <div style="text-align: center; padding: 40px; color: #999;">更多配置功能开发中...</div>
      </div>
    </div>
  </div>

  <!-- 回收站弹窗 -->
  <div id="recycleBinModal" class="modal-overlay">
    <div class="modal" style="max-width: 900px; width: 95%;">
      <div class="modal-title" style="display: flex; justify-content: space-between; align-items: center;">
        <span>🗑️ 回收站</span>
        <button class="btn" onclick="hideRecycleBin()" style="padding: 4px 12px; font-size: 12px;">✕ 关闭</button>
      </div>
      <div style="margin: 16px 0; display: flex; gap: 10px;">
        <button class="btn btn-secondary" onclick="loadRecycledProducts()">🔄 刷新</button>
        <button class="btn btn-primary" onclick="batchRestore()">✅ 批量恢复</button>
        <button class="btn btn-danger" onclick="batchDelete()">🗑️ 批量彻底删除</button>
      </div>
      <div id="recycleBinList" style="max-height: 400px; overflow-y: auto;">
        <div style="text-align: center; padding: 40px; color: #999;">加载中...</div>
      </div>
    </div>
  </div>

  <!-- 自定义弹窗 -->
  <div id="modalOverlay" class="modal-overlay">
    <div class="modal">
      <div class="modal-title" id="modalTitle">标题</div>
      <div class="modal-content" id="modalContent">内容</div>
      <div class="modal-buttons">
        <button class="btn" id="modalCancelBtn" onclick="hideModal()">取消</button>
        <button class="btn btn-primary" id="modalConfirmBtn" onclick="confirmAction()">确定</button>
      </div>
    </div>
  </div>

  <!-- Toast 提示 -->
  <div id="toast" class="toast">提示信息</div>

  <script>
    // 生产环境 API 地址（Railway 部署）
    const API_BASE = window.location.hostname === 'localhost' 
      ? 'http://localhost:3010/api' 
      : 'https://distribution-system-production.up.railway.app/api';
    let authToken = '';
    let products = [];
    let currentAction = null;

    // 页面加载时执行
    window.addEventListener('DOMContentLoaded', async function() {
      console.log('✅ 页面加载完成');
      await login();
      await loadDashboard(); // 默认加载数据统计
    });

    // 切换标签
    function switchTab(tabId) {
      document.querySelectorAll('.section').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.nav-tab').forEach(el => el.classList.remove('active'));
      document.getElementById(tabId).classList.add('active');
      event.target.classList.add('active');
      
      // 根据标签加载对应数据
      switch(tabId) {
        case 'dashboard':
          loadDashboard();
          break;
        case 'users':
          loadUsers();
          break;
        case 'referral':
          loadReferralTree();
          break;
        case 'commissions':
          loadCommissions();
          break;
        case 'orders':
          loadOrders();
          break;
        case 'products':
          loadProducts();
          break;
      }
    }

    // 登录
    async function login() {
      try {
        const res = await fetch(`${API_BASE}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: 'admin', password: 'admin123' })
        });
        const data = await res.json();
        if (data.code === 200) {
          authToken = data.data.token;
          console.log('✅ 登录成功');
          showToast('登录成功', 'success');
        } else {
          showToast('登录失败：' + data.message, 'error');
        }
      } catch (error) {
        showToast('登录错误：' + error.message, 'error');
      }
    }

    // API 请求
    async function fetchWithAuth(url, options = {}) {
      try {
        const res = await fetch(url, {
          ...options,
          headers: {
            ...options.headers,
            'Authorization': `Bearer ${authToken}`,
            'Content-Type': 'application/json'
          }
        });
        
        // 处理 401 未授权错误（密码修改后 token 失效）
        if (res.status === 401) {
          console.error('认证失败，token 已失效，请重新登录');
          localStorage.removeItem('admin_token');
          localStorage.removeItem('admin_user');
          // 静默跳转到登录页，不弹窗
          window.location.href = 'login.html';
          return { code: 401, message: '未授权' };
        }
        
        const data = await res.json();
        
        // 处理业务逻辑的 401 错误
        if (data.code === 401) {
          console.error('认证失败：', data.message);
          localStorage.removeItem('admin_token');
          localStorage.removeItem('admin_user');
          // 静默跳转到登录页
          window.location.href = 'login.html';
        }
        
        return data;
      } catch (error) {
        console.error('请求失败:', error);
        throw error;
      }
    }

    // 加载商品列表
    async function loadProducts() {
      const container = document.getElementById('productList');
      container.innerHTML = '<div style="text-align: center; padding: 40px; color: #999;">加载中...</div>';
      
      try {
        const res = await fetchWithAuth(`${API_BASE}/admin/products`);
        console.log('API 响应:', res);
        
        if (res.code === 200) {
          products = res.data.list;
          console.log('商品数量:', products.length);
          renderProducts();
        } else {
          showToast('加载失败：' + res.message, 'error');
          container.innerHTML = '<div style="text-align: center; padding: 40px; color: #f44;">加载失败</div>';
        }
      } catch (error) {
        console.error('加载错误:', error);
        showToast('加载错误：' + error.message, 'error');
        container.innerHTML = '<div style="text-align: center; padding: 40px; color: #f44;">加载错误</div>';
      }
    }

    // 渲染商品列表
    function renderProducts() {
      const container = document.getElementById('productList');
      
      if (products.length === 0) {
        container.innerHTML = '<div style="text-align: center; padding: 40px; color: #999;">暂无商品</div>';
        return;
      }
      
      const html = `
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>商品名称</th>
              <th>价格</th>
              <th>库存</th>
              <th>状态</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody>
            ${products.map(p => `
              <tr>
                <td>${p.id}</td>
                <td>${p.name}</td>
                <td>¥${p.currentPrice}</td>
                <td>${p.stock}</td>
                <td><span class="badge ${p.status === 1 ? 'badge-success' : 'badge-danger'}">${p.status === 1 ? '上架' : '下架'}</span></td>
                <td>
                  <div class="action-buttons">
                    <button class="btn btn-primary btn-sm" onclick="editProduct(${p.id})">编辑</button>
                    ${p.status === 1 
                      ? `<button class="btn btn-warning btn-sm" onclick="toggleProductStatus(${p.id}, 0)">下架</button>`
                      : `<button class="btn btn-success btn-sm" onclick="toggleProductStatus(${p.id}, 1)">上架</button>`
                    }
                    <button class="btn btn-danger btn-sm" onclick="deleteProduct(${p.id})">删除</button>
                  </div>
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
      container.innerHTML = html;
      console.log('商品列表渲染完成');
    }

    // 显示弹窗
    function showModal(title, content, onConfirm) {
      document.getElementById('modalTitle').textContent = title;
      document.getElementById('modalContent').innerHTML = content;
      document.getElementById('modalOverlay').classList.add('active');
      currentAction = onConfirm;
    }

    // 隐藏弹窗
    function hideModal() {
      document.getElementById('modalOverlay').classList.remove('active');
      currentAction = null;
    }

    // 确认操作
    function confirmAction() {
      if (currentAction) {
        currentAction();
      }
      hideModal();
    }

    // Toast 提示
    function showToast(message, type = 'info') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = 'toast active ' + type;
      setTimeout(() => {
        toast.classList.remove('active');
      }, 2000);
    }

    // 添加商品 - 在新标签页中打开
    function showAddProduct() {
      window.open('product-add.html', '_blank');
    }

    // 编辑商品 - 在新标签页中打开
    function editProduct(id) {
      const product = products.find(p => p.id === id);
      if (!product) {
        showToast('商品不存在', 'error');
        return;
      }
      // 在新标签页中打开编辑页面
      const editUrl = `product-edit.html?id=${id}`;
      window.open(editUrl, '_blank');
    }

    // 上架/下架商品
    function toggleProductStatus(id, newStatus) {
      const product = products.find(p => p.id === id);
      if (!product) return;
      
      const action = newStatus === 1 ? '上架' : '下架';
      
      showModal(
        '确认操作',
        `确定要${action}商品"${product.name}"吗？`,
        async () => {
          showToast(`${action}中...`, 'loading');
          
          try {
            const res = await fetchWithAuth(`${API_BASE}/admin/products/${id}/status`, {
              method: 'PUT',
              body: JSON.stringify({ status: newStatus })
            });
            
            if (res.code === 200) {
              showToast(`${action}成功`, 'success');
              await loadProducts();
            } else {
              showToast(`${action}失败：` + res.message, 'error');
            }
          } catch (error) {
            showToast(`${action}错误：` + error.message, 'error');
          }
        }
      );
    }

    // 删除商品
    function deleteProduct(id) {
      const product = products.find(p => p.id === id);
      if (!product) return;
      
      showModal(
        '确认删除',
        `⚠️ 确定要删除商品"${product.name}"吗？<br><br><span style="color: #999; font-size: 12px;">删除后将移入回收站，可从回收站恢复或彻底删除。</span>`,
        async () => {
          showToast('删除中...', 'loading');
          
          try {
            const res = await fetchWithAuth(`${API_BASE}/admin/products/${id}`, { 
              method: 'DELETE' 
            });
            
            if (res.code === 200) {
              showToast('商品已移入回收站', 'success');
              await loadProducts();
            } else {
              showToast('删除失败：' + res.message, 'error');
            }
          } catch (error) {
            showToast('删除错误：' + error.message, 'error');
          }
        }
      );
    }

    // ==================== 数据统计 ====================
    
    async function loadDashboard() {
      const container = document.getElementById('dashboardContent');
      container.innerHTML = '<div style="text-align: center; padding: 40px; color: #999;">加载中...</div>';
      
      try {
        const res = await fetchWithAuth(`${API_BASE}/admin/dashboard`);
        
        // 如果是 401 错误，已经跳转到登录页了，不需要再处理
        if (res.code === 401) {
          return;
        }
        
        if (res.code === 200) {
          const data = res.data;
          const html = `
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px;">
              <div style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 24px; border-radius: 12px;">
                <div style="font-size: 14px; opacity: 0.9;">👥 总用户数</div>
                <div style="font-size: 36px; font-weight: bold; margin-top: 8px;">${data.users.total}</div>
                <div style="font-size: 12px; margin-top: 8px; opacity: 0.8;">今日新增：${data.users.newToday}</div>
              </div>
              <div style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: white; padding: 24px; border-radius: 12px;">
                <div style="font-size: 14px; opacity: 0.9;">📦 总订单数</div>
                <div style="font-size: 36px; font-weight: bold; margin-top: 8px;">${data.orders.total}</div>
                <div style="font-size: 12px; margin-top: 8px; opacity: 0.8;">今日订单：${data.orders.today}</div>
              </div>
              <div style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); color: white; padding: 24px; border-radius: 12px;">
                <div style="font-size: 14px; opacity: 0.9;">💰 总销售额</div>
                <div style="font-size: 36px; font-weight: bold; margin-top: 8px;">¥${data.sales.total.toFixed(2)}</div>
                <div style="font-size: 12px; margin-top: 8px; opacity: 0.8;">今日销售：¥${data.sales.today.toFixed(2)}</div>
              </div>
              <div style="background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); color: white; padding: 24px; border-radius: 12px;">
                <div style="font-size: 14px; opacity: 0.9;">🎁 已发佣金</div>
                <div style="font-size: 36px; font-weight: bold; margin-top: 8px;">¥${data.commissions.paid.toFixed(2)}</div>
                <div style="font-size: 12px; margin-top: 8px; opacity: 0.8;">待发放：¥${data.commissions.pending.toFixed(2)}</div>
              </div>
            </div>
            <div style="background: white; border-radius: 12px; padding: 24px;">
              <div style="font-size: 18px; font-weight: bold; margin-bottom: 16px;">📦 商品统计</div>
              <div style="font-size: 24px;">上架商品：<strong style="color: #07c160;">${data.products.total}</strong> 个</div>
            </div>
          `;
          container.innerHTML = html;
        } else {
          // 其他错误显示友好提示

    // ==================== 分销关系 ====================
    
    async function loadReferralTree() {
      const container = document.getElementById('referralContent');
      container.innerHTML = '<div style="text-align: center; padding: 40px; color: #999;">加载中...</div>';
      
      try {
        const res = await fetchWithAuth(`${API_BASE}/admin/referral-tree`);
        
        if (res.code === 200) {
          const tree = res.data.tree;
          if (!tree || tree.length === 0) {
            container.innerHTML = '<div style="text-align: center; padding: 40px; color: #999;">暂无分销关系</div>';
            return;
          }
          
          // 扁平化树形结构
          const flatList = flattenTree(tree);
          
          const html = `
            <div style="padding: 20px;">
              <div style="margin-bottom: 16px; font-size: 14px; color: #666;">共 ${flatList.length} 个用户</div>
              <table>
                <thead>
                  <tr>
                    <th>ID</th>
                    <th>用户名</th>
                    <th>昵称</th>
                    <th>手机</th>
                    <th>推荐码</th>
                    <th>上级</th>
                    <th>下级数</th>
                    <th>加入时间</th>
                  </tr>
                </thead>
                <tbody>
                  ${flatList.map(item => `
                    <tr style="padding-left: ${item.indent * 20}px;">
                      <td>${item.id}</td>
                      <td style="padding-left: ${item.indent * 20}px;">${item.indent > 0 ? '└─ ' : ''}${item.username}</td>
                      <td>${item.nickname || '-'}</td>
                      <td>${item.phone || '-'}</td>
                      <td>${item.referralCode || '-'}</td>
                      <td>${item.parentName || '-'}</td>
                      <td>${item.childrenCount}</td>
                      <td>${new Date(item.created_at).toLocaleString('zh-CN')}</td>
                    </tr>
                  `).join('')}
                </tbody>
              </table>
            </div>
          `;
          container.innerHTML = html;
        } else {
          container.innerHTML = '<div style="text-align: center; padding: 40px; color: #f44;">加载失败：' + res.message + '</div>';
        }
      } catch (error) {
        console.error('加载分销关系失败:', error);
        container.innerHTML = '<div style="text-align: center; padding: 40px; color: #f44;">加载失败：' + error.message + '</div>';
      }
    }
    
    // 扁平化树形结构
    function flattenTree(tree, indent = 0, parentName = null) {
      let result = [];
      
      for (const node of tree) {
        result.push({
          id: node.id,
          username: node.username,
          nickname: node.nickname,
          phone: node.phone,
          referralCode: node.referralCode,
          referrerId: node.referrerId,
          parentName: parentName,
          indent: indent,
          childrenCount: node.children ? node.children.length : 0,
          created_at: node.created_at
        });
        
        if (node.children && node.children.length > 0) {
          result = result.concat(flattenTree(node.children, indent + 1, node.nickname || node.username));
        }
      }
      
      return result;
    }

            }
          } catch (error) {
            showToast(`${actionText}错误：` + error.message, 'error');
          }
        }
      );
    }
    
    // 重置用户密码
    async function resetUserPassword(userId, username) {
      const newPwd = prompt(`请输入 ${username} 的新密码：`, '123456');
      if (!newPwd) return;
      
      if (newPwd.length < 6) {
        showToast('密码至少 6 位', 'error');
        return;
      }
      
      try {
        const res = await fetchWithAuth(`${API_BASE}/admin/users/${userId}/reset-password`, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ password: newPwd })
        });
        
        if (res.code === 200) {
          showToast('密码重置成功', 'success');
        } else {
          showToast('重置失败：' + res.message, 'error');
        }
      } catch (error) {
        showToast('重置错误：' + error.message, 'error');
      }
    }
    
    // 删除用户
    async function deleteUser(userId, username) {
      showModal(
        '确认删除用户',
        `⚠️ 确定要删除用户"${username}"吗？<br><br><span style="color: #f44;">此操作不可恢复！</span>`,
        async () => {
          try {
            const res = await fetchWithAuth(`${API_BASE}/admin/users/${userId}`, {
              method: 'DELETE'
            });
            
            if (res.code === 200) {
              showToast('删除成功', 'success');
              await loadUsers();
            } else {
              showToast('删除失败：' + res.message, 'error');
            }
          } catch (error) {
            showToast('删除错误：' + error.message, 'error');
          }
        }
      );
    }
  </script>
</body>
</html>
